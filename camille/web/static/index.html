<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CAMILLE — Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060a07;
    --bg-soft:#0b1310;
    --panel:#0c130f;
    --panel-2:#0e1712;
    --line:#1c2a22;
    --line-bright:#2b4334;
    --green:#36f5a2;
    --green-dim:#1f9d68;
    --green-deep:#0c3b28;
    --text:#cfe8da;
    --muted:#6f8a7c;
    --faint:#46594e;
    --crit:#ff5b6e;
    --high:#ff924d;
    --med:#ffd23f;
    --low:#4ea8ff;
    --info:#7d8fa3;
    --glow:0 0 24px rgba(54,245,162,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    line-height:1.6;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  /* atmospheric layers */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(900px 500px at 80% -10%, rgba(54,245,162,.07), transparent 60%),
      radial-gradient(700px 600px at 0% 100%, rgba(31,157,104,.06), transparent 55%);
  }
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.35;
    background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.018) 0 1px,transparent 1px 3px);
    mix-blend-mode:overlay;
  }
  .wrap{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:38px 26px 90px}

  /* ── Header ───────────────────────────────────────────── */
  header{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:20px;margin-bottom:32px;flex-wrap:wrap;gap:18px}
  .brand{display:flex;align-items:center;gap:16px}
  .logo{
    width:46px;height:46px;border:1px solid var(--line-bright);border-radius:11px;
    display:grid;place-items:center;background:linear-gradient(160deg,#0e1c15,#081009);
    box-shadow:var(--glow);position:relative;flex-shrink:0;
  }
  .logo svg{width:24px;height:24px}
  .logo::after{content:"";position:absolute;inset:0;border-radius:11px;
    background:linear-gradient(180deg,transparent 60%,rgba(54,245,162,.08));}
  h1{font-family:'Space Grotesk',sans-serif;font-size:26px;letter-spacing:.32em;
    font-weight:700;color:#eafff4}
  h1 b{color:var(--green)}
  .sub{color:var(--muted);font-size:11.5px;letter-spacing:.12em;margin-top:3px;text-transform:uppercase}
  .status-dot{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-size:11.5px;
    letter-spacing:.1em;text-transform:uppercase}
  .status-dot i{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 10px var(--green);animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  /* ── Console / control panel ──────────────────────────── */
  .console{
    background:linear-gradient(180deg,var(--panel),var(--bg-soft));
    border:1px solid var(--line);border-radius:16px;overflow:hidden;
    box-shadow:0 24px 60px -30px rgba(0,0,0,.9);
  }
  .console-bar{display:flex;align-items:center;gap:8px;padding:13px 18px;
    border-bottom:1px solid var(--line);background:rgba(255,255,255,.012);white-space:nowrap}
  .console-bar span{width:11px;height:11px;border-radius:50%;background:#1c2a22;flex-shrink:0}
  .console-bar span:nth-child(1){background:#2a3a30}
  .console-bar .tt{margin-left:14px;color:var(--faint);font-size:11.5px;letter-spacing:.16em;
    overflow:hidden;text-overflow:ellipsis}
  .console-body{padding:26px}

  .field-label{font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--muted);margin-bottom:9px;display:block}
  .input-row{display:flex;gap:12px;flex-wrap:wrap}
  .target-box{flex:1;min-width:260px;display:flex;align-items:center;
    background:var(--bg);border:1px solid var(--line-bright);border-radius:10px;
    padding:0 16px;transition:border-color .2s, box-shadow .2s}
  .target-box:focus-within{border-color:var(--green-dim);box-shadow:var(--glow)}
  .target-box .prompt{color:var(--green);margin-right:10px;font-weight:700;user-select:none}
  .target-box input{flex:1;background:none;border:none;outline:none;color:var(--text);
    font-family:inherit;font-size:15px;padding:15px 0;letter-spacing:.02em}
  .target-box input::placeholder{color:var(--faint)}

  .btn{
    border:none;cursor:pointer;font-family:inherit;font-weight:700;font-size:13.5px;
    letter-spacing:.14em;text-transform:uppercase;border-radius:10px;padding:0 30px;
    background:linear-gradient(180deg,var(--green),var(--green-dim));color:#04140d;
    transition:transform .12s, box-shadow .2s, filter .2s;box-shadow:var(--glow)}
  .btn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.08)}
  .btn:active:not(:disabled){transform:translateY(0)}
  .btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}

  .opts{display:flex;flex-wrap:wrap;gap:10px 22px;margin-top:22px;
    padding-top:20px;border-top:1px solid var(--line)}
  .chk{display:flex;align-items:center;gap:9px;cursor:pointer;user-select:none;
    font-size:13px;color:var(--muted);transition:color .15s}
  .chk:hover{color:var(--text)}
  .chk input{display:none}
  .chk .box{width:17px;height:17px;border:1px solid var(--line-bright);border-radius:5px;
    display:grid;place-items:center;transition:all .15s;background:var(--bg)}
  .chk input:checked + .box{background:var(--green);border-color:var(--green)}
  .chk input:checked + .box::after{content:"";width:5px;height:9px;border:solid #04140d;
    border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .chk input:checked ~ .lbl{color:var(--text)}
  .opt-sep{width:1px;align-self:stretch;background:var(--line);margin:2px 4px}

  /* ── Progress timeline ────────────────────────────────── */
  .timeline{display:none;margin-top:26px;gap:0;border:1px solid var(--line);
    border-radius:12px;overflow:hidden}
  .timeline.on{display:flex}
  .tl-step{flex:1;padding:15px 16px;border-right:1px solid var(--line);
    display:flex;align-items:center;gap:11px;background:var(--panel);transition:background .3s}
  .tl-step:last-child{border-right:none}
  .tl-step .ico{width:9px;height:9px;border-radius:50%;background:var(--faint);
    flex-shrink:0;transition:all .3s}
  .tl-step.run .ico{background:var(--med);box-shadow:0 0 10px var(--med);
    animation:pulse 1s infinite}
  .tl-step.ok .ico{background:var(--green);box-shadow:0 0 10px var(--green)}
  .tl-step.err .ico{background:var(--crit);box-shadow:0 0 10px var(--crit)}
  .tl-step .nm{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
  .tl-step.run .nm,.tl-step.ok .nm{color:var(--text)}

  /* ── Results ──────────────────────────────────────────── */
  #results{margin-top:34px;display:flex;flex-direction:column;gap:22px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;opacity:0;transform:translateY(14px);
    animation:rise .5s cubic-bezier(.2,.7,.2,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .card-head{display:flex;align-items:center;justify-content:space-between;
    padding:17px 22px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.012)}
  .card-head .ttl{display:flex;align-items:center;gap:12px;font-family:'Space Grotesk',sans-serif;
    font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:14px}
  .card-head .ttl svg{width:18px;height:18px;color:var(--green)}
  .card-body{padding:22px}

  .score{display:flex;align-items:center;gap:16px}
  .ring{--p:0;--c:var(--green);width:60px;height:60px;border-radius:50%;flex-shrink:0;
    background:conic-gradient(var(--c) calc(var(--p)*1%),var(--line) 0);
    display:grid;place-items:center;position:relative}
  .ring::before{content:"";position:absolute;inset:6px;border-radius:50%;background:var(--panel)}
  .ring b{position:relative;font-size:16px;font-weight:800}
  .score .meta{font-size:12.5px;color:var(--muted);line-height:1.8}
  .score .meta b{color:var(--text);font-weight:500}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--muted);font-weight:500;font-size:11px;
    letter-spacing:.13em;text-transform:uppercase;padding:9px 14px;
    border-bottom:1px solid var(--line)}
  td{padding:11px 14px;border-bottom:1px solid rgba(28,42,34,.5);color:var(--text);
    vertical-align:top}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:rgba(54,245,162,.025)}
  .mono-dim{color:var(--muted);word-break:break-all}
  .pill{display:inline-block;padding:2px 9px;border-radius:5px;font-size:11px;
    font-weight:700;letter-spacing:.06em}
  .pill.port{background:var(--green-deep);color:var(--green)}
  .sev{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;
    letter-spacing:.08em;text-transform:uppercase}
  .sev::before{content:"";width:7px;height:7px;border-radius:50%}
  .sev.CRITICAL{color:var(--crit)} .sev.CRITICAL::before{background:var(--crit)}
  .sev.HIGH{color:var(--high)} .sev.HIGH::before{background:var(--high)}
  .sev.MEDIUM{color:var(--med)} .sev.MEDIUM::before{background:var(--med)}
  .sev.LOW{color:var(--low)} .sev.LOW::before{background:var(--low)}
  .sev.INFO{color:var(--info)} .sev.INFO::before{background:var(--info)}
  .tag{display:inline-block;background:var(--bg);border:1px solid var(--line-bright);
    color:var(--muted);padding:4px 11px;border-radius:6px;font-size:12px;margin:3px 4px 3px 0}
  .kv{display:grid;grid-template-columns:140px 1fr;gap:8px 18px;font-size:13px}
  .kv .k{color:var(--muted)}
  .empty{color:var(--faint);font-size:13px;padding:8px 0;font-style:italic}
  .alert{border:1px solid var(--crit);background:rgba(255,91,110,.07);color:#ffc2c9;
    padding:13px 16px;border-radius:9px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
  .alert svg{width:17px;height:17px;flex-shrink:0;margin-top:2px;color:var(--crit)}

  .toolbar{display:none;align-items:center;justify-content:space-between;margin-top:8px;
    flex-wrap:wrap;gap:14px}
  .toolbar.on{display:flex}
  .summary{color:var(--muted);font-size:12.5px;letter-spacing:.05em}
  .summary b{color:var(--green)}
  .ghost{background:none;border:1px solid var(--line-bright);color:var(--text);
    padding:10px 20px;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .18s}
  .ghost:hover{border-color:var(--green-dim);color:var(--green)}

  footer{text-align:center;color:var(--faint);font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;margin-top:60px;padding-top:24px;border-top:1px solid var(--line)}

  @media (max-width:680px){
    h1{font-size:20px;letter-spacing:.2em}
    .timeline{flex-wrap:wrap}.tl-step{min-width:50%}
    .kv{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#36f5a2" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2 4 5v6c0 5 3.4 8.5 8 11 4.6-2.5 8-6 8-11V5l-8-3Z"/>
          <path d="m9 12 2 2 4-4"/>
        </svg>
      </div>
      <div>
        <h1>CAM<b>I</b>LLE</h1>
        <div class="sub">Cyber Audit · Monitoring Intelligence</div>
      </div>
    </div>
    <div class="status-dot"><i></i> Système opérationnel</div>
  </header>

  <section class="console">
    <div class="console-bar">
      <span></span><span></span><span></span>
      <span class="tt">camille://recon-console</span>
    </div>
    <div class="console-body">
      <label class="field-label">Cible à analyser</label>
      <div class="input-row">
        <div class="target-box">
          <span class="prompt">›</span>
          <input id="target" type="text" autocomplete="off" spellcheck="false"
                 placeholder="example.com · 93.184.216.34 · https://site.fr"/>
        </div>
        <button class="btn" id="run">Lancer le scan</button>
      </div>

      <div class="opts">
        <label class="chk"><input type="checkbox" id="m-ports" checked><span class="box"></span><span class="lbl">Ports TCP</span></label>
        <label class="chk"><input type="checkbox" id="m-ssl" checked><span class="box"></span><span class="lbl">SSL / TLS</span></label>
        <label class="chk"><input type="checkbox" id="m-dns" checked><span class="box"></span><span class="lbl">DNS</span></label>
        <label class="chk"><input type="checkbox" id="m-http" checked><span class="box"></span><span class="lbl">En-têtes HTTP</span></label>
        <div class="opt-sep"></div>
        <label class="chk"><input type="checkbox" id="o-bf" checked><span class="box"></span><span class="lbl">Bruteforce sous-domaines</span></label>
        <label class="chk"><input type="checkbox" id="o-priv"><span class="box"></span><span class="lbl">Autoriser cibles privées</span></label>
      </div>

      <div class="timeline" id="timeline">
        <div class="tl-step" data-step="ports"><span class="ico"></span><span class="nm">Ports</span></div>
        <div class="tl-step" data-step="ssl"><span class="ico"></span><span class="nm">SSL/TLS</span></div>
        <div class="tl-step" data-step="dns"><span class="ico"></span><span class="nm">DNS</span></div>
        <div class="tl-step" data-step="http"><span class="ico"></span><span class="nm">HTTP</span></div>
      </div>
    </div>
  </section>

  <div class="toolbar" id="toolbar">
    <div class="summary" id="summary"></div>
    <div style="display:flex;align-items:center;gap:14px">
      <span id="dl-status" style="font-size:12px;color:var(--muted)"></span>
      <button class="ghost" id="dl">⤓ Exporter le rapport JSON</button>
    </div>
  </div>

  <div id="results"></div>

  <footer>CAMILLE v1.0.0 — Pour usage autorisé uniquement</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const results = $('#results');
const timeline = $('#timeline');
const runBtn = $('#run');
let evtSource = null;

function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function scoreColor(v){ return v>=75 ? 'var(--green)' : v>=40 ? 'var(--med)' : 'var(--crit)'; }

function setStep(step, state){
  const el = timeline.querySelector(`[data-step="${step}"]`);
  if(!el) return;
  el.classList.remove('run','ok','err');
  if(state) el.classList.add(state);
}

function card(title, icon, inner){
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `<div class="card-head"><div class="ttl">${icon}${esc(title)}</div></div>
    <div class="card-body">${inner}</div>`;
  results.appendChild(d);
}

const ICONS = {
  ports:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="6" rx="1"/><rect x="3" y="14" width="18" height="6" rx="1"/><path d="M7 7h.01M7 17h.01"/></svg>',
  ssl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
  dns:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg>',
  http:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg>'
};

function renderPorts(d){
  if(d.error){ card('Ports TCP', ICONS.ports, `<div class="empty">Erreur : ${esc(d.error)}</div>`); return; }
  const ports = d.data || [];
  if(!ports.length){ card('Ports TCP', ICONS.ports, `<div class="empty">Aucun port ouvert détecté.</div>`); return; }
  let rows = ports.map(p => `<tr>
      <td><span class="pill port">${esc(p.port)}</span></td>
      <td>${esc(p.service || '—')}</td>
      <td class="mono-dim">${esc(p.banner ? p.banner.slice(0,120) : '—')}</td></tr>`).join('');
  card(`Ports TCP · ${ports.length} ouvert(s)`, ICONS.ports,
    `<table><thead><tr><th>Port</th><th>Service</th><th>Bannière</th></tr></thead><tbody>${rows}</tbody></table>`);
}

function renderSSL(d){
  if(d.error || !d.data){ card('SSL / TLS', ICONS.ssl, `<div class="empty">SSL/TLS indisponible sur cette cible.</div>`); return; }
  const s = d.data;
  const issues = (s.issues||[]).map(i =>
    `<tr><td><span class="sev ${esc(i.severity)}">${esc(i.severity)}</span></td>
     <td><b>${esc(i.title)}</b><br><span class="mono-dim">${esc(i.description)}</span></td></tr>`).join('');
  const inner = `
    <div class="score">
      <div class="ring" style="--p:${s.score};--c:${scoreColor(s.score)}"><b style="color:${scoreColor(s.score)}">${s.score}</b></div>
      <div class="meta">
        Protocole <b>${esc(s.version||'—')}</b> · Chiffrement <b>${esc(s.cipher||'—')}</b> (${esc(s.bits)} bits)<br>
        CN <b>${esc((s.subject&&s.subject.commonName)||'—')}</b> · Émetteur <b>${esc((s.issuer&&s.issuer.organizationName)||'—')}</b><br>
        Validité <b>${esc(s.not_before?s.not_before.slice(0,10):'—')}</b> → <b>${esc(s.not_after?s.not_after.slice(0,10):'—')}</b>
      </div>
    </div>
    ${issues ? `<table style="margin-top:18px"><thead><tr><th>Sévérité</th><th>Anomalie</th></tr></thead><tbody>${issues}</tbody></table>`
             : `<div class="empty" style="margin-top:14px">Aucune anomalie SSL/TLS détectée.</div>`}`;
  card('SSL / TLS', ICONS.ssl, inner);
}

function renderDNS(d){
  if(d.error || !d.data){ card('DNS', ICONS.dns, `<div class="empty">Énumération DNS indisponible.</div>`); return; }
  const dn = d.data;
  let inner = '';
  if(dn.zone_transfer)
    inner += `<div class="alert" style="margin-bottom:16px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>
      <div><b>CRITIQUE — Transfert de zone (AXFR) réussi.</b><br>
      Le serveur expose l'intégralité de sa zone DNS.</div></div>`;
  const recs = (dn.records||[]).map(r =>
    `<tr><td><span class="pill port">${esc(r.record_type)}</span></td>
     <td class="mono-dim">${esc(r.value)}</td><td class="mono-dim">${esc(r.ttl)}</td></tr>`).join('');
  inner += recs
    ? `<table><thead><tr><th>Type</th><th>Valeur</th><th>TTL</th></tr></thead><tbody>${recs}</tbody></table>`
    : `<div class="empty">Aucun enregistrement DNS trouvé.</div>`;
  if((dn.subdomains||[]).length){
    inner += `<div style="margin-top:18px"><label class="field-label">Sous-domaines · ${dn.subdomains.length}</label>${
      dn.subdomains.map(s=>`<span class="tag">${esc(s)}</span>`).join('')}</div>`;
  }
  card('DNS', ICONS.dns, inner);
}

function renderHTTP(d){
  if(d.error || !d.data){ card('En-têtes HTTP', ICONS.http, `<div class="empty">Analyse HTTP impossible.</div>`); return; }
  const h = d.data;
  const issues = (h.issues||[]).slice().sort((a,b)=>a.severity.localeCompare(b.severity)).map(i =>
    `<tr><td><span class="sev ${esc(i.severity)}">${esc(i.severity)}</span></td>
     <td><b>${esc(i.header)}</b></td>
     <td><span class="mono-dim">${esc(i.description)}</span><br>
     <span style="color:var(--green-dim);font-size:12px">↳ ${esc(i.recommendation)}</span></td></tr>`).join('');
  const inner = `
    <div class="score">
      <div class="ring" style="--p:${h.score};--c:${scoreColor(h.score)}"><b style="color:${scoreColor(h.score)}">${h.score}</b></div>
      <div class="meta">
        Statut <b>${esc(h.status_code)}</b> · Serveur <b>${esc(h.server||'—')}</b><br>
        ${(h.redirects||[]).length ? 'Redirections : '+h.redirects.map(r=>`<span class="tag">${esc(r)}</span>`).join('') : 'Aucune redirection'}
      </div>
    </div>
    ${issues ? `<table style="margin-top:18px"><thead><tr><th>Sévérité</th><th>En-tête</th><th>Détail & recommandation</th></tr></thead><tbody>${issues}</tbody></table>`
             : `<div class="empty" style="margin-top:14px">Tous les en-têtes de sécurité sont présents.</div>`}`;
  card('En-têtes HTTP', ICONS.http, inner);
}

const RENDER = { ports:renderPorts, ssl:renderSSL, dns:renderDNS, http:renderHTTP };

function startScan(){
  const target = $('#target').value.trim();
  if(!target){ $('#target').focus(); return; }

  if(evtSource) evtSource.close();
  results.innerHTML = '';
  $('#toolbar').classList.remove('on');
  timeline.classList.add('on');
  timeline.querySelectorAll('.tl-step').forEach(s=>s.classList.remove('run','ok','err'));
  runBtn.disabled = true;
  runBtn.textContent = 'Scan en cours…';

  const modules = [];
  ['ports','ssl','dns','http'].forEach(m => { if($(`#m-${m}`).checked) modules.push(m); });
  // hide timeline steps not selected
  timeline.querySelectorAll('.tl-step').forEach(s=>{
    s.style.display = modules.includes(s.dataset.step) ? '' : 'none';
  });

  const params = new URLSearchParams({
    target,
    modules: modules.join(','),
    allow_private: $('#o-priv').checked ? 'true':'false',
    no_bruteforce: $('#o-bf').checked ? 'false':'true'
  });

  evtSource = new EventSource('/api/scan?' + params.toString());

  evtSource.addEventListener('progress', e=>{
    const {module} = JSON.parse(e.data);
    setStep(module, 'run');
  });
  evtSource.addEventListener('module', e=>{
    const d = JSON.parse(e.data);
    setStep(d.module, d.error ? 'err' : 'ok');
    (RENDER[d.module] || (()=>{}))(d);
  });
  evtSource.addEventListener('error', e=>{
    let msg = "Connexion au serveur interrompue.";
    try{ msg = JSON.parse(e.data).message; }catch(_){}
    results.innerHTML = `<div class="card" style="animation:none;opacity:1;transform:none">
      <div class="card-body"><div class="alert">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16h.01"/></svg>
      <div>${esc(msg)}</div></div></div></div>`;
    finish();
  });
  evtSource.addEventListener('done', e=>{
    const {duration} = JSON.parse(e.data);
    $('#summary').innerHTML = `Scan terminé en <b>${duration}s</b> · cible <b>${esc(target)}</b>`;
    $('#toolbar').classList.add('on');
    finish();
  });
}

function finish(){
  if(evtSource){ evtSource.close(); evtSource = null; }
  runBtn.disabled = false;
  runBtn.textContent = 'Lancer le scan';
}

runBtn.addEventListener('click', startScan);
$('#target').addEventListener('keydown', e=>{ if(e.key==='Enter') startScan(); });
function showDlStatus(msg, color){
  const el = $('#dl-status');
  el.textContent = msg;
  el.style.color = color || 'var(--muted)';
  if(msg){ clearTimeout(el._t); el._t = setTimeout(()=>{ el.textContent=''; }, 5000); }
}

$('#dl').addEventListener('click', async ()=>{
  // Desktop app (pywebview): no browser download manager — use the native
  // "Save As" dialog exposed by the Python side.
  const hasNativeApi = window.pywebview && window.pywebview.api
                        && window.pywebview.api.save_report;
  if(hasNativeApi){
    showDlStatus('Ouverture de la fenêtre d\u2019enregistrement\u2026');
    try{
      const res = await window.pywebview.api.save_report();
      if(res && res.ok){
        showDlStatus('\u2713 Rapport enregistré', 'var(--green)');
      } else if(res && res.cancelled){
        showDlStatus('Enregistrement annulé');
      } else {
        showDlStatus('\u2717 ' + ((res && res.error) || 'Échec de l\u2019export'), 'var(--crit)');
      }
    }catch(e){
      showDlStatus('\u2717 ' + e, 'var(--crit)');
    }
    return;
  }
  // Plain browser (camille serve): a normal download works fine.
  window.location = '/api/report.json';
});
</script>
